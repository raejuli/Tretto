version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: tretto-db
    environment:
      POSTGRES_DB: tretto
      POSTGRES_USER: tretto
      POSTGRES_PASSWORD: tretto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tretto"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tretto-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tretto
      SPRING_DATASOURCE_USERNAME: tretto
      SPRING_DATASOURCE_PASSWORD: tretto
      JWT_SECRET: ${JWT_SECRET:-devsecret_change_this_in_production_must_be_32_chars}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tretto-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
