spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tretto}
    username: ${SPRING_DATASOURCE_USERNAME:tretto}
    password: ${SPRING_DATASOURCE_PASSWORD:tretto}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:devsecretkey_change_in_production_must_be_at_least_256_bits}
    access-token-expiry-ms: 900000    # 15 minutes
    refresh-token-expiry-days: 7

server:
  port: 8080
